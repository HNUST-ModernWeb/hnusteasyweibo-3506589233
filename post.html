<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>湖科微光 - 发布动态</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="style.css">
</head>
<body data-page="post">
    <header class="site-header">
        <a class="brand" href="index.html" aria-label="湖科微光首页">
            <span class="brand-mark">H</span>
            <span>
                <strong>湖科微光</strong>
                <small>Easy Weibo</small>
            </span>
        </a>

        <nav class="top-nav" aria-label="主导航">
            <a href="index.html">首页</a>
            <a class="active" href="post.html">发布</a>
            <a href="profile.html">个人主页</a>
        </nav>

        <button class="ghost-button compact" id="theme-toggle" type="button">切换氛围</button>
    </header>

    <main class="page-grid">
        <section class="form-panel reveal">
            <p class="eyebrow">CREATE POST</p>
            <h2>发布一条校园动态</h2>
            <p class="section-lead">支持文字、话题分类、可见范围和本地图片预览。发布后会保存到浏览器本地，并出现在首页和个人主页。</p>

            <form class="post-form" id="post-form">
                <label class="field-block" for="post-content">
                    <span>动态内容</span>
                    <textarea id="post-content" name="content" rows="7" maxlength="280" placeholder="例如：图书馆四楼靠窗的位置很适合复习，今晚还有很好看的晚霞。" required></textarea>
                    <small><span id="content-count">0</span>/280 字</small>
                </label>

                <div class="field-row">
                    <label class="field-block" for="post-topic">
                        <span>话题分类</span>
                        <select id="post-topic" name="topic">
                            <option value="学习">学习</option>
                            <option value="生活">生活</option>
                            <option value="活动">活动</option>
                            <option value="失物招领">失物招领</option>
                        </select>
                    </label>

                    <label class="field-block" for="post-visibility">
                        <span>可见范围</span>
                        <select id="post-visibility" name="visibility">
                            <option value="全校可见">全校可见</option>
                            <option value="仅同学可见">仅同学可见</option>
                            <option value="仅自己可见">仅自己可见</option>
                        </select>
                    </label>
                </div>

                <label class="upload-zone" for="post-image">
                    <input id="post-image" name="image" type="file" accept="image/*">
                    <span>上传图片</span>
                    <small>选择一张本地图片，页面会实时预览</small>
                </label>

                <div class="image-preview" id="image-preview" hidden>
                    <img src="" alt="待发布图片预览">
                    <button class="ghost-button compact" id="clear-image" type="button">移除图片</button>
                </div>

                <p class="form-message" id="post-message" role="alert"></p>

                <div class="form-actions">
                    <button class="primary-button" type="submit">发布动态</button>
                    <button class="ghost-button" id="reset-post" type="button">清空</button>
                </div>
            </form>
        </section>

        <aside class="preview-panel reveal">
            <p class="eyebrow">PREVIEW</p>
            <h2>实时预览</h2>
            <article class="post-card preview-card">
                <header class="post-header">
                    <img class="avatar" id="preview-avatar" src="default-avatar.svg" alt="">
                    <div>
                        <strong id="preview-author">湖科同学</strong>
                        <span id="preview-meta">刚刚 · 全校可见</span>
                    </div>
                </header>
                <p class="post-content" id="preview-content">你输入的动态会显示在这里。</p>
                <img class="post-image" id="preview-image" src="" alt="预览配图" hidden>
                <div class="tag-row">
                    <span class="tag" id="preview-topic">#学习</span>
                </div>
            </article>

            <div class="mini-list">
                <h3>最近发布</h3>
                <div id="recent-posts"></div>
            </div>
        </aside>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="script.js"></script>
</body>
</html>
