<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>湖科微光 - 首页信息流</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="style.css">
</head>
<body data-page="home">
    <header class="site-header">
        <a class="brand" href="index.html" aria-label="湖科微光首页">
            <span class="brand-mark">H</span>
            <span>
                <strong>湖科微光</strong>
                <small>Easy Weibo</small>
            </span>
        </a>

        <nav class="top-nav" aria-label="主导航">
            <a class="active" href="index.html">首页</a>
            <a href="post.html">发布</a>
            <a href="profile.html">个人主页</a>
        </nav>

        <button class="ghost-button compact" id="theme-toggle" type="button">切换氛围</button>
    </header>

    <main class="layout-shell">
        <aside class="hero-panel reveal">
            <p class="eyebrow">HNUST CAMPUS FEED</p>
            <h2>把校园里一闪而过的灵感，收进同一条时间线。</h2>
            <p class="hero-text">这是一个简易社交分享平台原型，支持文字分享、图片发布、点赞、评论和个人资料保存。</p>
            <div class="hero-actions">
                <a class="primary-button" href="post.html">写一条动态</a>
                <a class="text-link" href="profile.html">完善个人主页</a>
            </div>
            <div class="metric-grid" aria-label="平台数据">
                <div>
                    <strong id="stat-posts">0</strong>
                    <span>动态</span>
                </div>
                <div>
                    <strong id="stat-likes">0</strong>
                    <span>点赞</span>
                </div>
                <div>
                    <strong id="stat-comments">0</strong>
                    <span>评论</span>
                </div>
            </div>
        </aside>

        <section class="content-stack">
            <article class="composer-card reveal">
                <div>
                    <p class="eyebrow">QUICK START</p>
                    <h2>今天有什么想分享？</h2>
                    <p>课程笔记、食堂新发现、社团招新、晚霞照片，都可以先从一条动态开始。</p>
                </div>
                <a class="primary-button" href="post.html">去发布</a>
            </article>

            <section class="feed-toolbar reveal" aria-label="信息流筛选">
                <div>
                    <p class="eyebrow">LIVE FEED</p>
                    <h2>校园信息流</h2>
                </div>
                <div class="filter-group" role="group" aria-label="动态类型筛选">
                    <button class="filter-chip active" type="button" data-filter="all">全部</button>
                    <button class="filter-chip" type="button" data-filter="学习">学习</button>
                    <button class="filter-chip" type="button" data-filter="生活">生活</button>
                    <button class="filter-chip" type="button" data-filter="活动">活动</button>
                </div>
            </section>

            <div class="feed-list" id="feed-list" aria-live="polite"></div>
            <div class="empty-state" id="feed-empty" hidden>
                <strong>还没有动态</strong>
                <p>去发布页写下第一条校园分享吧。</p>
                <a class="primary-button" href="post.html">立即发布</a>
            </div>
        </section>
    </main>

    <template id="post-template">
        <article class="post-card reveal">
            <header class="post-header">
                <img class="avatar" data-role="avatar" src="default-avatar.svg" alt="">
                <div>
                    <strong data-role="author"></strong>
                    <span data-role="meta"></span>
                </div>
            </header>
            <p class="post-content" data-role="content"></p>
            <img class="post-image" data-role="image" alt="动态配图">
            <div class="tag-row" data-role="tags"></div>
            <footer class="post-actions">
                <button class="action-button" type="button" data-action="like"></button>
                <button class="action-button" type="button" data-action="comment">评论</button>
                <button class="action-button danger" type="button" data-action="delete">删除</button>
            </footer>
            <form class="comment-form" data-role="comment-form">
                <input type="text" name="comment" placeholder="写一句友善的评论..." maxlength="80" aria-label="评论内容">
                <button type="submit">发送</button>
            </form>
            <div class="comment-list" data-role="comments"></div>
        </article>
    </template>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="script.js"></script>
</body>
</html>
