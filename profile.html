<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>湖科微光 - 个人主页</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="style.css">
</head>
<body data-page="profile">
    <header class="site-header">
        <a class="brand" href="index.html" aria-label="湖科微光首页">
            <span class="brand-mark">H</span>
            <span>
                <strong>湖科微光</strong>
                <small>Easy Weibo</small>
            </span>
        </a>

        <nav class="top-nav" aria-label="主导航">
            <a href="index.html">首页</a>
            <a href="post.html">发布</a>
            <a class="active" href="profile.html">个人主页</a>
        </nav>

        <button class="ghost-button compact" id="theme-toggle" type="button">切换氛围</button>
    </header>

    <main class="profile-layout">
        <section class="profile-card reveal">
            <div class="profile-cover"></div>
            <div class="profile-body">
                <img class="profile-avatar" id="profile-avatar" src="default-avatar.svg" alt="个人头像">
                <p class="eyebrow">MY PROFILE</p>
                <h2 id="profile-name-display">湖科同学</h2>
                <p class="profile-major" id="profile-major-display">现代 Web 学习者</p>
                <p class="profile-bio" id="profile-bio-display">喜欢记录课堂灵感、校园日常和一点点没来由的好奇心。</p>

                <div class="metric-grid compact-metrics">
                    <div>
                        <strong id="profile-post-count">0</strong>
                        <span>动态</span>
                    </div>
                    <div>
                        <strong id="profile-like-count">0</strong>
                        <span>获赞</span>
                    </div>
                    <div>
                        <strong id="profile-comment-count">0</strong>
                        <span>评论</span>
                    </div>
                </div>
            </div>
        </section>

        <section class="settings-panel reveal">
            <p class="eyebrow">EDIT CARD</p>
            <h2>编辑个人资料</h2>
            <p class="section-lead">这部分参考了你之前的个人简介页：头像可上传，昵称和简介可编辑，并保存到本地。</p>

            <form class="profile-form" id="profile-form">
                <label class="upload-zone avatar-upload-zone" for="profile-avatar-input">
                    <input id="profile-avatar-input" type="file" accept="image/*">
                    <span>更换头像</span>
                    <small>选择图片后会立即更新预览</small>
                </label>

                <label class="field-block" for="profile-name">
                    <span>昵称</span>
                    <input id="profile-name" type="text" maxlength="18" placeholder="请输入昵称" required>
                </label>

                <label class="field-block" for="profile-major">
                    <span>身份/专业</span>
                    <input id="profile-major" type="text" maxlength="28" placeholder="例如：计算机科学与技术">
                </label>

                <label class="field-block" for="profile-bio">
                    <span>个人简介</span>
                    <textarea id="profile-bio" rows="5" maxlength="120" placeholder="介绍一下你自己"></textarea>
                </label>

                <p class="form-message" id="profile-message" role="alert"></p>

                <div class="form-actions">
                    <button class="primary-button" type="submit">保存资料</button>
                    <button class="ghost-button" id="reset-profile" type="button">恢复默认</button>
                </div>
            </form>
        </section>

        <section class="my-posts-panel reveal">
            <div class="section-heading">
                <div>
                    <p class="eyebrow">MY POSTS</p>
                    <h2>我的动态</h2>
                </div>
                <a class="text-link" href="post.html">继续发布</a>
            </div>
            <div class="feed-list compact-feed" id="profile-posts"></div>
            <div class="empty-state" id="profile-empty" hidden>
                <strong>你还没有发布动态</strong>
                <p>写下第一条内容后，它会展示在这里。</p>
                <a class="primary-button" href="post.html">去发布</a>
            </div>
        </section>
    </main>

    <template id="post-template">
        <article class="post-card reveal">
            <header class="post-header">
                <img class="avatar" data-role="avatar" src="default-avatar.svg" alt="">
                <div>
                    <strong data-role="author"></strong>
                    <span data-role="meta"></span>
                </div>
            </header>
            <p class="post-content" data-role="content"></p>
            <img class="post-image" data-role="image" alt="动态配图">
            <div class="tag-row" data-role="tags"></div>
            <footer class="post-actions">
                <button class="action-button" type="button" data-action="like"></button>
                <button class="action-button" type="button" data-action="comment">评论</button>
                <button class="action-button danger" type="button" data-action="delete">删除</button>
            </footer>
            <form class="comment-form" data-role="comment-form">
                <input type="text" name="comment" placeholder="写一句友善的评论..." maxlength="80" aria-label="评论内容">
                <button type="submit">发送</button>
            </form>
            <div class="comment-list" data-role="comments"></div>
        </article>
    </template>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="script.js"></script>
</body>
</html>
